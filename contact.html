<!DOCTYPE html>
<html lang="en">

<head>
    <title>Family RV Life - Contact</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>

<body>

    <nav class="navbar navbar-default">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="index.html">Family RV Life</a>
            </div>

            <ul class="nav navbar-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="tips.html">Tips</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li class="active"><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="container page-space">
        <h1>Contact</h1>
        <p>If you want to learn more about family RV life, send a message below.</p>
        <div id="form-wrapper">
            <form onsubmit="return submitForm()">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" class="form-control" id="name" required>

                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea class="form-control" id="message" rows="4" required></textarea>
                </div>

                <button type="submit" class="btn btn-success">Submit</button>
                <p style="text-align: center; margin-top: 20px;">
                    We will get back to you as soon as possible!
                </p>

                <p id="form-message"></p>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Family RV Life</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
